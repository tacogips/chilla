name: release-macos-dmg

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-macos-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-dmg:
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/chilla-signing-certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/chilla-build.keychain"
          security default-keychain -s "$RUNNER_TEMP/chilla-build.keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/chilla-build.keychain"
          security set-keychain-settings -t 3600 -u "$RUNNER_TEMP/chilla-build.keychain"
          security import "$RUNNER_TEMP/chilla-signing-certificate.p12" \
            -k "$RUNNER_TEMP/chilla-build.keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$RUNNER_TEMP/chilla-build.keychain"
          security find-identity -v -p codesigning "$RUNNER_TEMP/chilla-build.keychain"

      - name: Build macOS bundles
        id: build
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeUpdaterJson: false
          tauriScript: bun run tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('chilla {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/v') && 'Signed macOS app and DMG bundles for this release.' || '' }}
          releaseDraft: false
          prerelease: false
          args: --config src-tauri/tauri.macos.release.conf.json --bundles app,dmg

      - name: Upload manual build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chilla-macos-dmg
          if-no-files-found: error
          path: ${{ steps.build.outputs.artifactPaths }}

      - name: Cleanup temporary keychain
        if: ${{ always() && secrets.KEYCHAIN_PASSWORD != '' }}
        run: security delete-keychain "$RUNNER_TEMP/chilla-build.keychain" || true

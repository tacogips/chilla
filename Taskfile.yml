version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  dev-stop:
    desc: Stop repo-local desktop dev processes
    cmds:
      - pkill -f "$PWD/node_modules/.bin/tauri dev" || true
      - pkill -f "$PWD/node_modules/.bin/vite" || true
      - pkill -f "$PWD/target/debug/chilla" || true

  clean-node-modules:
    desc: Remove frontend dependencies and Bun/Vite build caches
    cmds:
      - rm -rf node_modules
      - rm -rf .vite

  dev:
    desc: Run the desktop app in development mode
    cmds:
      - task: dev-stop
      - rm -rf src-tauri/target/debug
      - bun run tauri dev

  dev-clean:
    desc: Run the desktop app in development mode after building frontend assets
    cmds:
      - task: dev-stop
      - bun run build
      - rm -rf src-tauri/target/debug
      - bun run tauri dev

  build:
    desc: Build frontend assets and the desktop binary
    cmds:
      - bun run build
      - CARGO_TERM_QUIET=true cargo build --release --manifest-path src-tauri/Cargo.toml

  nix-build:
    desc: Build the default flake package with Nix
    cmds:
      - nix build .#chilla

  bundle-macos-dmg:
    desc: Build macOS .app and .dmg bundles through the Tauri release config
    cmds:
      - bun run build
      - CARGO_TERM_QUIET=true bun run tauri build --config src-tauri/tauri.macos.release.conf.json --bundles app,dmg

  test:
    desc: Run frontend and backend verification
    cmds:
      - bun run typecheck
      - bun run test
      - CARGO_TERM_QUIET=true cargo test --manifest-path src-tauri/Cargo.toml

  test-tauri-e2e-linux:
    desc: Run Linux desktop E2E verification with tauri-driver
    cmds:
      - bun run test:tauri:e2e:linux

  check:
    desc: Run frontend typecheck and cargo check
    cmds:
      - bun run typecheck
      - CARGO_TERM_QUIET=true cargo check --manifest-path src-tauri/Cargo.toml

  clippy:
    desc: Run clippy for the Tauri backend
    cmds:
      - CARGO_TERM_QUIET=true cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  fmt:
    desc: Format frontend and backend sources
    cmds:
      - bash .agents/scripts/format-ts.sh
      - cargo fmt --manifest-path src-tauri/Cargo.toml

  fmt-check:
    desc: Check backend formatting
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  lint:
    desc: Run all lints (fmt check + clippy)
    cmds:
      - task: fmt-check
      - task: clippy

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - cargo clean --manifest-path src-tauri/Cargo.toml

  ci:
    desc: Run all CI checks
    cmds:
      - task: build
      - task: test
      - task: clippy

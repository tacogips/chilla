version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  dev:
    desc: Run the desktop app in development mode
    cmds:
      - bun run tauri dev

  build:
    desc: Build frontend assets and the desktop binary
    cmds:
      - bun run build
      - CARGO_TERM_QUIET=true cargo build --release --manifest-path src-tauri/Cargo.toml

  nix-build:
    desc: Build the default flake package with Nix
    cmds:
      - nix build .#chilla

  test:
    desc: Run frontend and backend verification
    cmds:
      - bun run typecheck
      - bun run test
      - CARGO_TERM_QUIET=true cargo test --manifest-path src-tauri/Cargo.toml

  check:
    desc: Run frontend typecheck and cargo check
    cmds:
      - bun run typecheck
      - CARGO_TERM_QUIET=true cargo check --manifest-path src-tauri/Cargo.toml

  clippy:
    desc: Run clippy for the Tauri backend
    cmds:
      - CARGO_TERM_QUIET=true cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  fmt:
    desc: Format frontend and backend sources
    cmds:
      - bash .agents/scripts/format-ts.sh
      - cargo fmt --manifest-path src-tauri/Cargo.toml

  fmt-check:
    desc: Check backend formatting
    cmds:
      - cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

  lint:
    desc: Run all lints (fmt check + clippy)
    cmds:
      - task: fmt-check
      - task: clippy

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - cargo clean --manifest-path src-tauri/Cargo.toml

  ci:
    desc: Run all CI checks
    cmds:
      - task: build
      - task: test
      - task: clippy
